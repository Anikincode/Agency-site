<!doctype html>
<html lang="en-CA">
  <head>
    <meta charset="UTF-8" />
    <link rel="icon" type="image/svg+xml" href="favicon.svg" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Anikin Technologies — SEO, Web Design &amp; Google Ads in Etobicoke</title>
    <meta
      name="description"
      content="Anikin Technologies helps local businesses in Etobicoke and Toronto get found on Google through SEO, web design, and Google Ads."
    />
  </head>
  <body>
    <div id="root"></div>
    <script>
      // Restore path from GitHub Pages 404 redirect
      (function() {
        var redirect = sessionStorage.redirect;
        delete sessionStorage.redirect;
        if (redirect && redirect !== location.href) {
          history.replaceState(null, null, redirect);
        }
        // Handle ?p= query param from 404.html
        var search = window.location.search;
        if (search && search.indexOf('?p=') === 0) {
          var path = decodeURIComponent(search.slice(3));
          history.replaceState(null, null, '/Agency-site' + (path.charAt(0) === '/' ? path : '/' + path));
        }
      })();
    </script>
    <script type="module" src="src/main.jsx"></script>
  </body>
</html>
