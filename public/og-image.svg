<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="630" viewBox="0 0 1200 630">
  <!-- Background -->
  <rect width="1200" height="630" fill="#0f0f0f"/>

  <!-- Accent bar top-left -->
  <rect x="80" y="80" width="6" height="60" rx="3" fill="#1a56ff"/>

  <!-- Company name -->
  <text x="104" y="122" font-family="Inter, Arial, sans-serif" font-size="36" font-weight="700" fill="#ffffff" letter-spacing="-0.5">Anikin Technologies</text>

  <!-- Divider -->
  <rect x="80" y="160" width="1040" height="1" fill="#222222"/>

  <!-- Headline -->
  <text x="80" y="270" font-family="Inter, Arial, sans-serif" font-size="72" font-weight="800" fill="#ffffff" letter-spacing="-2">Get Your Business</text>
  <text x="80" y="358" font-family="Inter, Arial, sans-serif" font-size="72" font-weight="800" fill="#1a56ff" letter-spacing="-2">Found Online.</text>

  <!-- Subline -->
  <text x="80" y="430" font-family="Inter, Arial, sans-serif" font-size="28" font-weight="400" fill="#888888">SEO · Web Design · Google Ads · Etobicoke, Ontario</text>

  <!-- Divider bottom -->
