  <!-- Stats row -->
  <text x="80" y="545" font-family="Inter, Arial, sans-serif" font-size="22" font-weight="600" fill="#ffffff">45 websites built</text>
  <text x="80" y="573" font-family="Inter, Arial, sans-serif" font-size="18" font-weight="400" fill="#555555">anikin.ca</text>

  <text x="380" y="545" font-family="Inter, Arial, sans-serif" font-size="22" font-weight="600" fill="#ffffff">25+ active clients</text>

  <text x="680" y="545" font-family="Inter, Arial, sans-serif" font-size="22" font-weight="600" fill="#ffffff">+340% organic traffic</text>
  <text x="680" y="573" font-family="Inter, Arial, sans-serif" font-size="18" font-weight="400" fill="#555555">DrainRooter case study</text>
