<!DOCTYPE html>
<html>
<head>
  <meta charset="utf-8">
  <title>Anikin Technologies</title>
  <script>
    // GitHub Pages SPA redirect hack — redirects 404s back to index with the path preserved
    var path = window.location.pathname;
    var search = window.location.search;
    var hash = window.location.hash;
    window.location.replace(
      window.location.origin + '/?p=' + encodeURIComponent(path + search + hash)
    );
  </script>
</head>
<body></body>
</html>
